<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Squid Remote Control</title>
    <style>
      :root {
        --bg: #0b1118;
        --panel: #141f2b;
        --text: #e9f2ff;
        --muted: #93a6bf;
        --ok: #25a244;
        --warn: #d1495b;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1a2a3d 0%, var(--bg) 60%);
        color: var(--text);
      }
      .wrap {
        max-width: 840px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .panel {
        background: var(--panel);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }
      h1 { margin: 0 0 12px; }
      p { color: var(--muted); }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .start { background: var(--ok); color: white; }
      .stop { background: var(--warn); color: white; }
      .ghost { background: #223447; color: var(--text); }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        background: #0f1823;
        border-radius: 10px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>Crypto Squid Remote</h1>
        <p>Control and monitor the VPS runtime through Vercel proxy functions.</p>
        <div class="row">
          <button class="start" onclick="control('start')">Start</button>
          <button class="stop" onclick="control('stop')">Stop</button>
          <button class="ghost" onclick="refreshAll()">Refresh</button>
        </div>
        <pre id="out">Loading...</pre>
      </div>
    </div>
    <script>
      const out = document.getElementById("out");

      async function call(path) {
        const r = await fetch(path);
        const body = await r.json();
        return { status: r.status, body };
      }

      async function control(action) {
        const result = await call(`/api/control?action=${action}`);
        out.textContent = JSON.stringify(result, null, 2);
      }

      async function refreshAll() {
        const [health, snapshot, status] = await Promise.all([
          call("/api/health"),
          call("/api/snapshot"),
          call("/api/control?action=status"),
        ]);
        out.textContent = JSON.stringify({ health, snapshot, control: status }, null, 2);
      }

      refreshAll();
    </script>
  </body>
</html>
